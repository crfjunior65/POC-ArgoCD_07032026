apiVersion: v1  
kind: Secret  
metadata:
  name: argocd-image-updater-config
  namespace: argocd  
stringData:  
  log.level: debug  
  registries.conf: | 
    registries:
    - name: Docker Hub
      prefix: docker.io
      api_url: https://registry-1.docker.io
  git.config: |  
    commit_message_template: "chore: update image to {{.NewTag}}"
    author_name: "ArgoCD Image Updater"
    author_email: "argocd-image-updater@github.com"
  git-credentials: |
    https://crfjunior65:${GITHUB_TOKEN}@github.com
